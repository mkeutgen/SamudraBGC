# Configuration for comparing ocean emulator rollouts with ground truth
# This file defines experiments, data paths, and analysis settings

# Experiments to compare (name: path to predictions.zarr)
# Paths are relative to the Ocean_Emulator directory where you run the scripts
experiments:
  # 10-year deterministic rollout (validation + test) for helmholtz_min_grad05
  "Helmholtz Minimal MAE + Grad 0.5 (2010-2019 rollout)": "outputs/jra_helmholtz_min_grad05_eval_rollout2010_2019/predictions.zarr/"
  # Add ensemble/baselines as they finish:
  # "Helmholtz Minimal MAE + Grad 0.5 (2015-2019 ensemble mean)": "outputs/jra_helmholtz_min_grad05_ensemble_eval_test/predictions.zarr/"
  # "Fullstate baseline": "outputs/another_experiment/predictions.zarr/"

# Path to ground truth data
ground_truth_path: null  # Set OCEAN_EMU_DATA_ROOT env var

# Output directory for results
output_dir: "outputs/jra_comparison_rollout2010_2019"

# Time slice for evaluation (YYYY-MM-DD)
# Set to null to use full time range
time_slice:
  - "2010-01-01"
  - "2014-12-31"  # EXTREMELY IMPORTANT exclude LAST 5 years BECAUSE IT IS TEST DATA

# Grid spacing in kilometers (for spectral analysis)
dx_km: 9.0

# Variables to exclude from analysis (optional)
# exclude_variables: []  # include all variables (psi/phi kept)

# Analysis options
compute_regional: false  # Compute metrics for different ocean regions (SLOW - disable for speed)
save_time_series: true  # Save time series data to CSV
save_spatial_fields: false  # Save spatial fields (can be large)

# Visualization settings
visualization:
  # Spring bloom progression: March-May each year
  # Time indices RELATIVE TO ROLLOUT START (2010-01-01 = 0, no-leap, daily):
  # Jan 1: 0, Mar 15: 74, Apr 15: 105, May 15: 135 (and repeat for each year)
  snapshot_times: [0, 74, 105, 135, 440, 471, 501, 806, 837, 867, 1172, 1203, 1233]

  # Time index for spectral analysis
  spectral_time_idx: 1096  # 2013-01-01 (relative index, middle of validation period)

  # Figure DPI
  dpi: 150

  # Plot types to generate
  plot_types:
    - seasonal
    - interannual
    - gradient_scatter
    - gradient_pdf
    - regional_ts


#     - timeseries
#    - spatial
#    - spectra
#     - taylor

# Animation settings (optional)
animations:
  create: false  # Set to true to create animations
  start_frame: 2626
  n_frames: 90  # Number of frames
  fps: 7  # Frames per second
  variables:  # Variables to animate
    - temp_0
    - salt_0
    - chl_0
    - no3_0
    - dic_0

# Regional analysis boundaries (degrees North)
# Default regions for North Atlantic double gyre:
#   Subtropical Gyre: < 37°N
#   Jet Region: 37°N - 43°N
#   Subpolar Gyre: > 43°N
regional_boundaries:
  subtropical_jet: 37
  jet_subpolar: 43

# Memory management
memory:
  batch_size: 40  # Number of variables to process at once (maximized for 780GB RAM)
  clear_cache_between_batches: true
