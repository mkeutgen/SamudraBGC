# 4-way comparison: Phase 4 architecture ablation
# Compares baseline (phase3 winner), deeper, wider, and deeper+wider architectures
# on the validation period (2010-2014).
#
# All experiments use: Helmholtz (ψ,φ) + Log BGC + gradient_weight = 0.25
# Only varying: model architecture (depth and width)

experiments:
  "Baseline (phase3)":    "outputs/phase2_helmholtz_grad025_eval_linear/predictions.zarr/"
  "Deeper (4 levels)":    "outputs/phase4_arch_deeper_eval/predictions.zarr/"
  "Wider (+25% ch)":      "outputs/phase4_arch_wider_eval/predictions.zarr/"
  "Deeper + Wider":       "outputs/phase4_arch_deeper_wider_eval/predictions.zarr/"

# Path to ground truth data
ground_truth_path: null  # Set OCEAN_EMU_DATA_ROOT env var

# Output directory for results
output_dir: "outputs/phase4_arch_comparison"

# Validation period: use 2013-2014 (last 2 years) for faster evaluation; error accumulation is diagnostic
time_slice:
  - "2013-01-01"
  - "2014-12-31"

# Grid spacing in kilometers (for spectral analysis)
dx_km: 9.0

# Analysis options
compute_regional: true  # Regional metrics (now feasible with 2-year window)
save_time_series: true
save_spatial_fields: false

# Visualization settings
visualization:
  # Single snapshot: Spring 2014 (day 444 from 2013-01-01)
  snapshot_times: [444]

  # Time index for spectral analysis (middle of test period, relative index)
  spectral_time_idx: 365  # 2014-01-01

  # Figure DPI
  dpi: 150

  # Plot types to generate
  plot_types:
    - spatial
    - timeseries
    - variable_pdf

  # Skip surface-level _0 spatial figures
  exclude_spatial_variables:
    - temp_0
    - salt_0
    - psi_0
    - phi_0
    - dic_0
    - o2_0
    - no3_0
    - chl_0

# Memory management
memory:
  batch_size: 40
  clear_cache_between_batches: true
