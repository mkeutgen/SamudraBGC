# yaml-language-server: $schema=../../schemas/EvalConfig.json
# Evaluation for: phase2_mae_dynamic_nw125_nologno3
# Purpose: 30-day rollout from 2016-01-01 to check if model has learned

debug: false
save_zarr: true
disk_mode: true
ckpt_path: ./outputs/phase2_mae_dynamic_nw125_nologno3/saved_nets/ema_ckpt.pt
inference_time:
  start: '2016-01-01'
  end: '2016-01-31'
num_model_steps_forward: 5
backend: auto

experiment:
  name: phase2_mae_dynamic_nw125_nologno3_rollout30days
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: ''  # Set WANDB_PROJECT env var
    entity: ''  # Set WANDB_ENTITY env var
    group: mom6-bgc-eval-jra60
    tags:
    - "phase2-mae-dynamic"
    - "no-log-no3"
    - "nw125"
    - "evaluation"
    - "rollout-30days"
  prognostic_vars_key: helmholtz_log_no_logno3_all
  boundary_vars_key: minimal_forcing
  data_root: null  # Set OCEAN_EMU_DATA_ROOT env var

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 3
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false
