# yaml-language-server: $schema=../../schemas/TrainConfig.json
# ============================================================================
# Experiment: Helmholtz Decomposition with Minimal Forcing
# Phase: 1.3 - Forcing comparison
# Hypothesis: Test if corrected PRCmE normalization helps on 60yr dataset
# Expected: Slightly worse than standard_forcing, especially for salinity
# ============================================================================

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 60
batch_size: 1
learning_rate: 0.0002
scheduler:
  type: cosine
loss: mae_gradient_weighted
gradient_weight: 0.5
second_order_weight: 0.0
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0

# Time configuration (excludes 1990 to prevent data leakage)
train_time:
  start: '1960-01-01'
  end: '1989-12-31'    # 30 years training
val_time:
  start: '1991-01-01'
  end: '1995-12-31'    # 5 years validation (skips 1990)
inference_times:
- start: '2001-01-01'
  end: '2019-12-31'    # 19 years paper holdout

data_stride:
- 1
steps:
- 4
step_transition: []
backend: auto

experiment:
  name: jra_helmholtz_min_grad05
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: bgc-emulator
    entity: mkeutgen
    group: mom6-bgc-training-jra60
    tags:
    - "phase1-forcing"
    - "helmholtz-decomposition"
    - "minimal-forcing-no-prcme"
    - "grad-0.5"
    - "ablation"
  prognostic_vars_key: optimized_helmholtz_all
  boundary_vars_key: minimal_forcing
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 24
  persistent_workers: true
  prefetch_factor: 8
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false

# Expected output channels: ~301
# Variables: dic, o2, temp, salt, psi, phi @ 50 levels + SSH + chl_0
# Forcing: Only Qnet, tauuo, tauvo (no PRCmE)
