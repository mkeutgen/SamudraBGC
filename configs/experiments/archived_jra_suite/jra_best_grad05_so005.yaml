# yaml-language-server: $schema=../../schemas/TrainConfig.json
# ============================================================================
# Experiment: Conservative Second-Order (Recommended)
# Phase: 2.2 - Loss function
# Hypothesis: Light curvature penalty sharpens features without stability issues
# Expected: Best balance of accuracy and sharpness - RECOMMENDED
# NOTE: Update prognostic_vars_key and boundary_vars_key with Phase 1 winner
# ============================================================================

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 60
batch_size: 1
learning_rate: 0.0002
scheduler:
  type: cosine
loss: mae_gradient_weighted
gradient_weight: 0.5
second_order_weight: 0.05  # Conservative second-order
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0

# Time configuration (excludes 1990 to prevent data leakage)
train_time:
  start: '1960-01-01'
  end: '1989-12-31'    # 30 years training
val_time:
  start: '1991-01-01'
  end: '1995-12-31'    # 5 years validation (skips 1990)
inference_times:
- start: '2001-01-01'
  end: '2019-12-31'    # 19 years paper holdout

data_stride:
- 1
steps:
- 4
step_transition: []
backend: auto

experiment:
  name: jra_best_grad05_so005
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: bgc-emulator
    entity: m2lines
    group: mom6-bgc-training-jra60
    tags:
    - "phase2-loss"
    - "second-order-curvature"
    - "grad-0.5"
    - "second-order-0.05"
    - "conservative-recommended"
  prognostic_vars_key: optimized_helmholtz_all  # TODO: Update with Phase 1 winner
  boundary_vars_key: standard_forcing            # TODO: Update with Phase 1 winner
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 4
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false

# Purpose: Test if light Laplacian penalty improves sharpness without sacrificing stability
