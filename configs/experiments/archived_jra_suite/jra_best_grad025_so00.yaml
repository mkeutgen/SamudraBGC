# yaml-language-server: $schema=../../schemas/TrainConfig.json
# ============================================================================
# Experiment: Reduced Gradient Loss (0.25) - No Second Order
# Phase: 2.x - Loss function refinement
# Hypothesis: grad 0.5 hurts accuracy too much, grad 0.25 balances better
# Expected: Better R² (especially regional salinity, velocities) with some gradient preservation
# NOTE: Based on grad05_so00 results showing negative regional R² and poor velocities
# ============================================================================

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 60
batch_size: 1
learning_rate: 0.0002
scheduler:
  type: cosine
loss: mae_gradient_weighted
gradient_weight: 0.25   # Reduced from 0.5 to improve accuracy
second_order_weight: 0.0  # Disabled - first-order only
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0

# Time configuration (excludes 1990 to prevent data leakage)
train_time:
  start: '1960-01-01'
  end: '1989-12-31'    # 30 years training
val_time:
  start: '1991-01-01'
  end: '1995-12-31'    # 5 years validation (skips 1990)
inference_times:
- start: '2001-01-01'
  end: '2019-12-31'    # 19 years paper holdout

data_stride:
- 1
steps:
- 4
step_transition: []
backend: auto

experiment:
  name: jra_best_grad025_so00
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: bgc-emulator
    entity: m2lines
    group: mom6-bgc-training-jra60
    tags:
    - "phase2-loss"
    - "reduced-gradient"
    - "grad-0.25"
    - "second-order-0.0"
    - "accuracy-focused"
  prognostic_vars_key: optimized_helmholtz_all  
  boundary_vars_key: minimal_forcing            
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 4
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false

# Purpose: Reduce gradient penalty to improve regional R² while maintaining some structure
