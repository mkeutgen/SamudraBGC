# yaml-language-server: $schema=schemas/TrainConfig.json

# Training configuration for MOM6-Cobalt with 50 depth levels and noleap calendar

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 10
batch_size: 1  # Reduced for 50 depth levels (more memory required)
learning_rate: 0.0002
scheduler: { type: cosine }
loss: mse
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0

# Time ranges using noleap calendar (YYYY-MM-DD format)
train_time:
  start: "2016-01-01"
  end: "2016-06-30"
val_time:
  start: "2016-07-01"
  end: "2016-11-30"
inference_times:
  - start: "2016-12-01"
    end: "2016-12-31"


data_stride: [1]
steps: [4]
step_transition: []

backend: auto

experiment:
  name: mom6_cobalt_bgc
  rand_seed: 15
  base_output_dir: ./outputs
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: mom6-cobalt-train
  prognostic_vars_key: bgc_thermo_all  # 357 variables (50 levels × 7 vars + SSH)
  boundary_vars_key: minimal_forcing
  data_root: /scratch/cimes/maximek/INMOS/clim_data_proc  # UPDATE THIS PATH

data:
  data_location: bgc_data_oneyear.zarr
  data_means_location: bgc_means_oneyear.zarr
  data_stds_location: bgc_stds_oneyear.zarr
  scaling_residuals_file: null
  num_workers: 0 # 1
  hist: 0

model:
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"
  
  # UNet architecture adjusted for 50 depth levels
  # Input channels: 357 (prog) + 4 (bound) = 361
  unet:
    ch_width: [504, 256]  # Increased first layer for more variables
    dilation: [1, 8]
    n_layers: [1, 1]

    core_block:
      block_type: "conv_next_block"
      kernel_size: 3
      activation: "capped_gelu"
      upscale_factor: 4
      norm: "batch"

    down_sampling_block: "avg_pool"
    up_sampling_block: "bilinear_upsample"

  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false
