# Configuration for comparing ocean emulator rollouts with ground truth
# This file defines experiments, data paths, and analysis settings

# Experiments to compare (name: path to predictions.zarr)
# Paths are relative to the Ocean_Emulator directory where you run the scripts
experiments:
  "Full MAE + Grad 0.5": "outputs/jra_fullstate_grad05_eval/predictions.zarr/"
  "Helmholtz MAE + Grad 0.5": "outputs/jra_helmholtz_std_grad05_eval/predictions.zarr/"
  "Helmholtz Minimal MAE + Grad 0.5": "outputs/jra_helmholtz_min_grad05_eval/predictions.zarr/"

  # Add more experiments here:
  # "Another Experiment": "outputs/another_experiment/predictions.zarr/"

# Path to ground truth data
ground_truth_path: "/scratch/gpfs/GEOCLIM/LRGROUP/maximek/MOM6_CobaltDG_JRA_FULL/bgc_data.zarr/"

# Output directory for results
output_dir: "outputs/jra_comparison"

# Time slice for evaluation (YYYY-MM-DD)
# Set to null to use full time range
time_slice:
  - "1990-01-01"
  - "1999-12-31"  # 10 years for full rollout comparison

# Grid spacing in kilometers (for spectral analysis)
dx_km: 9.0

# Variables to exclude from analysis (optional)
exclude_variables:
  - "psi_0"  # Streamfunction
  - "phi_0"  # Velocity potential

# Analysis options
compute_regional: false  # Compute metrics for different ocean regions (SLOW - disable for speed)
save_time_series: true  # Save time series data to CSV
save_spatial_fields: false  # Save spatial fields (can be large)

# Visualization settings
visualization:
  # Spring bloom progression: 1990-01-03, 1995-03/04/05-15, 1997-03/04/05-15
  snapshot_times: [0, 1896, 1927, 1957, 2626, 2657, 2687, 3356, 3387, 3417]

  # Time index for spectral analysis
  spectral_time_idx: 2687  # Corresponds to 1995-05-15

  # Figure DPI
  dpi: 150

  # Plot types to generate
  plot_types:
    - timeseries
    - spatial
    - spectra
    - regional

# Animation settings (optional)
animations:
  create: false  # Set to true to create animations
  start_frame: 2626
  n_frames: 90  # Number of frames
  fps: 7  # Frames per second
  variables:  # Variables to animate
    - temp_0
    - salt_0
    - chl_0
    - no3_0
    - dic_0

# Regional analysis boundaries (degrees North)
# Default regions for North Atlantic double gyre:
#   Subtropical Gyre: < 37°N
#   Jet Region: 37°N - 43°N
#   Subpolar Gyre: > 43°N
regional_boundaries:
  subtropical_jet: 37
  jet_subpolar: 43

# Memory management
memory:
  batch_size: 40  # Number of variables to process at once (maximized for 780GB RAM)
  clear_cache_between_batches: true
