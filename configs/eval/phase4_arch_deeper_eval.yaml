# yaml-language-server: $schema=../../schemas/EvalConfig.json
# Evaluation for: phase4_arch_deeper
# Paper Ablation - Phase 4: Architecture Ablation (deeper: 4 UNet levels)

debug: false
save_zarr: true
disk_mode: true
ckpt_path: ./outputs/phase4_arch_deeper/saved_nets/ema_ckpt.pt
inference_time:
  start: '2010-01-01'
  end: '2014-12-31'
num_model_steps_forward: 5
backend: auto

experiment:
  name: phase4_arch_deeper_eval
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: bgc-emulator
    entity: m2lines
    group: paper-ablations-phase4-eval
    tags:
    - "paper-ablation"
    - "phase4-architecture"
    - "helmholtz-decomposition"
    - "deeper"
    - "evaluation"
  prognostic_vars_key: helmholtz_log_all
  boundary_vars_key: minimal_forcing
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC_Helmholtz

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 520
    - 600
    dilation:
    - 1
    - 2
    - 4
    - 8
    n_layers:
    - 1
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false
