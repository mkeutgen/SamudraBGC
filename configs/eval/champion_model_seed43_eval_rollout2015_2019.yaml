# yaml-language-server: $schema=../../schemas/EvalConfig.json
# 5-year rollout (2015-2019, test holdout) for champion_model_seed43 (70 epochs, pca20 + helmholtz + grad=0.10)

debug: false
save_zarr: true
disk_mode: true
ckpt_path: ./outputs/champion_model_seed43/saved_nets/ema_ckpt.pt
inference_time:
  start: '2015-01-01'
  end: '2019-12-31'
num_model_steps_forward: 5
backend: auto

experiment:
  name: champion_model_seed43_eval_rollout2015_2019
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: ''  # Set WANDB_PROJECT env var
    entity: ''  # Set WANDB_ENTITY env var
    group: phase5-pca-eval
    tags:
    - "champion"
    - "phase5-pca"
    - "helmholtz-decomposition"
    - "pca-k20"
    - "grad-0.10"
    - "70-epochs"
    - "eval"
    - "rollout-2015-2019"
    - "test-holdout"
    - "seed-43"
  prognostic_vars_key: helmholtz_log_no_logno3_pca20_all
  boundary_vars_key: minimal_forcing
  data_root: null  # Set OCEAN_EMU_DATA_ROOT env var

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 3
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false

pca:
  pca_params_path: pca_params.npz  # Relative to OCEAN_EMU_DATA_ROOT
  original_data_root: .  # Use OCEAN_EMU_DATA_ROOT (same as data_root)
  original_prognostic_vars_key: helmholtz_log_no_logno3_all
  n_components: 20
