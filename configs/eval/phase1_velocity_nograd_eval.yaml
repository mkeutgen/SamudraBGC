# yaml-language-server: $schema=../../schemas/EvalConfig.json
# Evaluation for: phase1_fullstate_nograd
# Paper Ablation - Phase 1: Variable Selection (Velocity u,v — no gradient penalty)
# Counterpart to phase1_helmholtz_nograd_eval: same setup, u,v instead of psi,phi

debug: false
save_zarr: true
disk_mode: true
ckpt_path: ./outputs/phase1_fullstate_nograd/saved_nets/ema_ckpt.pt
inference_time:
  start: '2010-01-01'
  end: '2014-12-31'
num_model_steps_forward: 20
backend: auto

experiment:
  name: phase1_velocity_nograd_eval
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: ''  # Set WANDB_PROJECT env var
    entity: ''  # Set WANDB_ENTITY env var
    group: paper-ablations-phase1-eval
    tags:
    - "paper-ablation"
    - "phase1-variable-selection"
    - "velocity-uv"
    - "no-gradient-penalty"
    - "evaluation"
  prognostic_vars_key: full_state_all
  boundary_vars_key: minimal_forcing
  data_root: null  # Set OCEAN_EMU_DATA_ROOT env var

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false
