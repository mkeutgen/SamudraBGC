# yaml-language-server: $schema=../../schemas/EvalConfig.json
# 50-member ensemble evaluation for phase5_pca20_helmholtz_grad010
# Test holdout period 2015
# Perturbations mimic numerical MOM6-COBALT ensemble generation:
#   - Density-compensated T/S (0.05°C, 90km correlation)
#   - Lognormal BGC (DIC, O2, NO3 at 1% relative std — halved from 2%)
#   - Cosine taper to zero at 100m depth

debug: false
save_zarr: true
disk_mode: true
ckpt_path: ./outputs/phase5_pca20_helmholtz_grad010/saved_nets/ema_ckpt.pt
inference_time:
  start: '2015-01-01'
  end: '2015-12-31'
num_model_steps_forward: 20
backend: auto

# Ensemble configuration
ensemble:
  enabled: true
  n_ensemble: 50
  depth_max_m: 100.0
  dx_km: 9.0
  corr_sigma_km: 90.0
  pert_std_temp: 0.05
  pert_rel_dic: 0.01
  pert_rel_o2: 0.01
  pert_rel_no3: 0.01
  use_vertical_taper: true
  seed_offset: 0
  output_individual_members: true
  output_ensemble_mean: true
  output_ensemble_std: true

experiment:
  name: phase5_pca20_helmholtz_grad010_eval_ensemble50_halfbgc_2015
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: bgc-emulator
    entity: m2lines
    group: phase5-pca-ensemble
    tags:
    - "ensemble"
    - "phase5-pca"
    - "helmholtz-decomposition"
    - "pca-k20"
    - "grad-0.10"
    - "test-holdout-2015"
    - "50-members"
    - "half-bgc-pert"
  prognostic_vars_key: helmholtz_log_no_logno3_pca20_all
  boundary_vars_key: minimal_forcing
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC_Helmholtz

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 3
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false

pca:
  pca_params_path: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC_Helmholtz/pca_params.npz
  original_data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC_Helmholtz
  original_prognostic_vars_key: helmholtz_log_no_logno3_all
  n_components: 20
