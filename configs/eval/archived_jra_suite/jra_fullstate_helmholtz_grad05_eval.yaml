# yaml-language-server: $schema=../../schemas/EvalConfig.json
# Evaluation for: jra_fullstate_helmholtz_grad05
# Phase: 1.4 - Full State + Helmholtz (Wild Card)

debug: false
save_zarr: true
disk_mode: true
ckpt_path: ./outputs/jra_fullstate_helmholtz_grad05/saved_nets/ema_ckpt.pt
inference_time:
  start: '1990-01-01'
  end: '1999-12-31'
num_model_steps_forward: 5
backend: auto

experiment:
  name: jra_fullstate_helmholtz_grad05_eval
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: bgc-emulator
    entity: m2lines
    group: mom6-bgc-eval-jra60
    tags:
    - "phase1-prognostic"
    - "overcomplete-representation"
    - "both-velocity-forms"
    - "standard-forcing"
    - "grad-0.5"
    - "wild-card"
    - "evaluation"
  prognostic_vars_key: full_state_and_helmholtz_all
  boundary_vars_key: standard_forcing
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 3
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false
