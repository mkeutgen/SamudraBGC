# yaml-language-server: $schema=../../schemas/EvalConfig.json
# 5-year rollout (2015-2019, test holdout) for asinh NO3 experiment

debug: false
save_zarr: true
disk_mode: true
ckpt_path: ./outputs/phase_asinh_no3/saved_nets/ema_ckpt.pt
inference_time:
  start: '2015-01-01'
  end: '2019-12-31'
num_model_steps_forward: 5
backend: auto

experiment:
  name: phase_asinh_no3_eval_rollout2015_2019
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: ''  # Set WANDB_PROJECT env var
    entity: ''  # Set WANDB_ENTITY env var
    group: ablation-asinh-no3-eval
    tags:
    - "ablation"
    - "asinh-transform"
    - "no3"
    - "helmholtz-decomposition"
    - "evaluation"
    - "rollout-2015-2019"
    - "test-holdout"
  prognostic_vars_key: helmholtz_log_asinh_no3_all
  boundary_vars_key: minimal_forcing
  data_root: null  # Set OCEAN_EMU_DATA_ROOT env var

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 3
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false
