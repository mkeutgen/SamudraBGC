# Configuration for collaborative metrics comparison
#
# This config is designed for computing metrics aligned with collaborator conventions:
# - RMSE at specific lead times (1, 3, 5, 10, 20 days)
# - ACC (Anomaly Correlation Coefficient)
# - Ensemble metrics: CRPS, SSR, covariance metrics
#
# Usage:
#   python scripts/compute_collaborative_metrics.py --config configs/eval/collaborative_metrics_example.yaml

# Experiments to compare (treated as ensemble members for probabilistic metrics)
experiments:
  # Format: experiment_name: /path/to/predictions.zarr
  helmholtz_grad05: /scratch/cimes/maximek/INMOS/Ocean_Emulator/outputs/jra_helmholtz_min_grad05_eval_rollout2010_2019/predictions.zarr
  #fullstate_grad05: /scratch/cimes/maximek/INMOS/experiments/jra_fullstate_grad05/rollout_predictions.zarr
  #classical_mae: /scratch/cimes/maximek/INMOS/experiments/jra_classical_mae/rollout_predictions.zarr

# Ground truth data path
ground_truth_path: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC_Helmholtz/bgc_data.zarr

# Time slice for evaluation (optional)
# If not specified, uses full overlap between predictions and ground truth
time_slice:
  - "2010-01-03"
  - "2014-12-29"

# Lead times to evaluate (in days)
# Common choices: 1, 3, 5, 10, 20 days
lead_days:
  - 1
  - 3
  - 5
  - 10
  - 20

# Variables to analyze
# If not specified, uses all available variables
variables:
  - temp_0      # Sea Surface Temperature
  - salt_0      # Sea Surface Salinity
  - uo_0        # Zonal Velocity
  - vo_0        # Meridional Velocity
  - psi_0       # Streamfunction
  - phi_0       # Velocity Potential
  - dic_0       # Dissolved Inorganic Carbon
  - o2_0        # Dissolved Oxygen
  - no3_0       # Nitrate
  - chl_0       # Chlorophyll

# Output directory for results
output_dir: outputs/collaborative_metrics

# Metrics configuration
metrics:
  # Deterministic metrics (always computed)
  compute_rmse: true
  compute_acc: true
  compute_mae: true
  compute_bias: true

  # Ensemble/probabilistic metrics (requires multiple experiments)
  compute_ensemble: false   # If true and >= 2 experiments, compute CRPS, SSR

  # Whether to compute time series of metrics
  compute_time_series: true
