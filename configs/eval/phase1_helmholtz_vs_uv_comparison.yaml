# 2-way comparison: Phase 1 variable selection (Helmholtz vs u,v)
# Compares:
#   1. phase1_helmholtz_nograd (linear BGC, helmholtz)
#   2. phase1_velocity_nograd (linear BGC, u,v)

# Experiments to compare (name: path to predictions.zarr)
experiments:
  "Phase 1: Helmholtz (Linear BGC)": "outputs/phase1_helmholtz_nograd_eval/predictions.zarr/"
  "Phase 1: Full State u,v (Linear BGC)": "outputs/phase1_velocity_nograd_eval/predictions.zarr/"

# Path to ground truth data
ground_truth_path: "/scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC_Helmholtz/bgc_data.zarr"

# Output directory for results
output_dir: "outputs/phase1_helmholtz_vs_uv_comparison"

# Time slice for evaluation (YYYY-MM-DD)
# Use 2013-2014 (last 2 years) for faster evaluation; error accumulation is diagnostic
time_slice:
  - "2013-01-01"
  - "2014-12-31"

# Grid spacing in kilometers (for spectral analysis)
dx_km: 9.0

# Analysis options
compute_regional: true  # Regional metrics (now feasible with 2-year window)
save_time_series: true  # Save time series to CSV for plotting
save_spatial_fields: false  # Save spatial fields

# Visualization settings
visualization:
  # Single snapshot: Spring 2014 (day 444 from 2013-01-01)
  snapshot_times: [444]

  # Time index for spectral analysis (middle of test period, relative index)
  spectral_time_idx: 365  # 2014-01-01

  # Figure DPI
  dpi: 150

  # Plot types to generate
  plot_types:
    - spatial
    - timeseries
    - variable_pdf

  # Skip surface-level _0 spatial figures
  exclude_spatial_variables:
    - temp_0
    - salt_0
    - psi_0
    - phi_0
    - dic_0
    - o2_0
    - no3_0
    - chl_0

# Memory management
memory:
  batch_size: 40
  clear_cache_between_batches: true
