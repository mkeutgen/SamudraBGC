# yaml-language-server: $schema=../../schemas/TrainConfig.json
# ============================================================================
# Phase 7: Architecture Ablation on PCA k=20 winner
# Configuration: Wider + Deeper model (4 UNet levels, ch_width [400,550,650,750])
# Base: Phase 5 PCA k=20 (best R²=0.6964)
# Hypothesis: Combined depth + width scaling maximizes capacity for PCA repr.
# ============================================================================

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 50
batch_size: 1
learning_rate: 0.0002
scheduler:
  type: cosine
loss: mae_gradient_weighted
gradient_weight: 0.10
second_order_weight: 0.0
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0

train_time:
  start: '1960-01-01'
  end: '2009-12-31'
val_time:
  start: '2010-01-01'
  end: '2014-12-31'
inference_times:
- start: '2015-01-01'
  end: '2019-12-31'

data_stride:
- 1
steps:
- 4
step_transition: []
backend: auto

experiment:
  name: phase7_pca20_arch_wider_deeper
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: bgc-emulator
    entity: m2lines
    group: phase7-arch
    tags:
    - "phase7-architecture"
    - "pca-k20"
    - "wider-deeper"
    - "grad-0.10"
  prognostic_vars_key: helmholtz_log_no_logno3_pca20_all
  boundary_vars_key: minimal_forcing
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC_Helmholtz

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 400
    - 550
    - 650
    - 750
    dilation:
    - 1
    - 2
    - 4
    - 8
    n_layers:
    - 1
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false

# 121 prognostic channels (8 vars × 15 PCs + SSH)
# Architecture: ch_width [400,550,650,750] — 4 levels + ~25% wider
