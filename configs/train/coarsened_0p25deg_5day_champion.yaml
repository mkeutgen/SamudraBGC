# yaml-language-server: $schema=../../schemas/TrainConfig.json
# ============================================================================
# Champion Model on Coarsened Data (0.25°, 5-day)
# Configuration: Helmholtz + Log BGC, PCA k=20, gradient_weight = 0.10
# Same as champion model but trained on spatially (2x) and temporally (5x) coarsened data
# ============================================================================

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 1
learning_rate: 0.0002
scheduler:
  type: cosine
loss: mae_gradient_weighted
gradient_weight: 0.10
second_order_weight: 0.0
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0

# Full training: train+val period merged, test period used for monitoring
# Same date ranges as champion - dataset loader handles 5-day resolution
train_time:
  start: '1960-01-01'
  end: '2014-12-31'    # 55 years training (train + val)
val_time:
  start: '2015-01-01'
  end: '2019-12-31'    # 5 years test period (monitoring only)
inference_times:
- start: '2015-01-01'
  end: '2019-12-31'    # 5 years paper holdout

data_stride:
- 1
steps:
- 4
step_transition: []
backend: auto

experiment:
  name: coarsened_champion
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: ''  # Set WANDB_PROJECT env var
    entity: ''  # Set WANDB_ENTITY env var
    group: coarsened-0p25deg-5day
    tags:
    - "coarsened"
    - "0p25deg"
    - "5day"
    - "helmholtz-decomposition"
    - "pca-k20"
    - "grad-0.10"
  prognostic_vars_key: helmholtz_log_no_logno3_pca20_all
  boundary_vars_key: minimal_forcing
  # Coarsened data with PCA variables
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_JRA_FULL_POC_Helmholtz_0p25deg_5day

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  hist: 1
  concurrent_compute: true

model:
  checkpointing: null
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false

# Variables: log_dicpc, log_o2pc, no3pc, log_chlpc, temppc, saltpc, psipc, phipc @ 20 PCA components + SSH
# Forcing: Qnet, tauuo, tauvo (minimal forcing)
# Grid: 181x181 (coarsened from 362x362)
# Time: 5-day resolution (73 steps/year vs 365 steps/year)
