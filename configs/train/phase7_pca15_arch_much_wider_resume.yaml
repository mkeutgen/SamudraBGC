# yaml-language-server: $schema=../../schemas/TrainConfig.json
# Phase 7: Architecture Ablation — Much Wider [512,700,960] — RESUME from epoch 25
# PCA k=15

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 50
batch_size: 1
learning_rate: 0.0002
scheduler:
  type: cosine
loss: mae_gradient_weighted
gradient_weight: 0.10
second_order_weight: 0.0
finetune: false
resume_ckpt_path: ./outputs/phase7_pca15_arch_much_wider/saved_nets/ckpt_25.pt
inference_epochs: []
data_percent: 1.0
preemptible: true

train_time:
  start: '1960-01-01'
  end: '2009-12-31'
val_time:
  start: '2010-01-01'
  end: '2014-12-31'
inference_times:
- start: '2015-01-01'
  end: '2019-12-31'

data_stride:
- 1
steps:
- 4
step_transition: []
backend: auto
dynamic_n_window: 25
ema_decay: 0.999
faster_decay_at_start: true
test_using_ema: true
gradient_scales: null

experiment:
  name: phase7_pca15_arch_much_wider
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: ''  # Set WANDB_PROJECT env var
    entity: ''  # Set WANDB_ENTITY env var
    group: phase7-arch
    tags:
    - "phase7-architecture"
    - "pca-k15"
    - "much-wider"
    - "grad-0.10"
    - "resume"
  prognostic_vars_key: helmholtz_log_no_logno3_pca15_all
  boundary_vars_key: minimal_forcing
  data_root: null  # Set OCEAN_EMU_DATA_ROOT env var

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  hist: 1
  concurrent_compute: true
  loader_version: om4-torch
  log_transform_vars: null
  masked_fill_value: 0.0
  normalize_before_mask: true
  static_data_vars: null

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  pos_channels: 0
  unet:
    ch_width:
    - 512
    - 700
    - 960
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false

profiler:
  cuda_snapshot_frequency: null
