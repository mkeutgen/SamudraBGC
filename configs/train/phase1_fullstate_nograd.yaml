# yaml-language-server: $schema=../../schemas/TrainConfig.json
# ============================================================================
# Paper Ablation Study - Phase 1: Variable Selection
# Configuration: Full state (u, v) - NO gradient penalty
# Hypothesis: Direct velocity prediction may struggle with divergence-free constraint
# ============================================================================

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 50
batch_size: 1
learning_rate: 0.0002
scheduler:
  type: cosine
loss: mae_gradient_weighted
gradient_weight: 0.0
second_order_weight: 0.0
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0

# Time configuration
train_time:
  start: '1960-01-01'
  end: '2009-12-31'    # 50 years training
val_time:
  start: '2010-01-01'
  end: '2014-12-31'    # 5 years validation
inference_times:
- start: '2015-01-01'
  end: '2019-12-31'    # 5 years paper holdout

data_stride:
- 1
steps:
- 4
step_transition: []
backend: auto

experiment:
  name: phase1_fullstate_nograd
  rand_seed: 42
  base_output_dir: ./outputs
  wandb:
    mode: offline
    project: ''  # Set WANDB_PROJECT env var
    entity: ''  # Set WANDB_ENTITY env var
    group: paper-ablations-phase1
    tags:
    - "paper-ablation"
    - "phase1-variable-selection"
    - "full-state-uv"
    - "no-gradient-penalty"
  prognostic_vars_key: full_state_all
  boundary_vars_key: minimal_forcing
  data_root: null  # Set OCEAN_EMU_DATA_ROOT env var

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  hist: 1
  concurrent_compute: true

model:
  checkpointing: all
  pred_residuals: false
  last_kernel_size: 3
  pad: constant
  unet:
    ch_width:
    - 320
    - 440
    - 600
    dilation:
    - 1
    - 2
    - 4
    n_layers:
    - 1
    - 1
    - 1
    core_block:
      block_type: conv_next_block
      kernel_size: 3
      activation: capped_gelu
      upscale_factor: 2
      norm: batch
    down_sampling_block: avg_pool
    up_sampling_block: bilinear_upsample
  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false

# Variables: dic, o2, no3, chl, temp, salt, uo, vo, poc @ 50 levels + SSH
# Forcing: Qnet, tauuo, tauvo (minimal forcing)
