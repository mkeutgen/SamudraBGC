# yaml-language-server: $schema=schemas/TrainConfig.json

# =============================================================================
# EXPERIMENT 1A: MAE + Weighted Gradient Loss (Conservative α=0.1)
# =============================================================================
# Priority: CRITICAL - Most likely to fix the bias problem
# 
# Problem addressed: Current MAE+Grad has too strong gradient penalty causing
# systematic positive bias (especially in salinity: +0.030 g/kg at day 150)
#
# Solution: Explicit weighting parameter to balance MAE vs gradient terms
# Starting conservative (α=0.1) to prevent gradient term dominating
#
# Expected outcome: Sharper gradients than baseline, but accuracy much closer
# to baseline MAE performance (bias < 0.01 g/kg)
# =============================================================================

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 40  # Slightly longer than baseline to ensure convergence
batch_size: 1
learning_rate: 0.0002
scheduler: { type: cosine }

# NEW LOSS CONFIGURATION
loss: mae_gradient_weighted  # NOTE: Requires code changes in train.py
gradient_weight: 0.1  # α parameter - start conservative

finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0

# Time ranges using noleap calendar (YYYY-MM-DD format)
train_time:
  start: "2016-01-01"
  end: "2023-12-31"
val_time:
  start: "2024-01-01"
  end: "2024-12-31" 
inference_times:
  - start: "2024-01-01"
    end: "2024-06-30"
  - start: "2025-07-01"
    end: "2025-12-31"

data_stride: [1]
steps: [4]
step_transition: []

backend: auto

experiment:
  name: mom6_cobalt_bgc_clim_mae_grad_w01_helmholtz_l40s
  rand_seed: 15
  base_output_dir: ./outputs
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: mom6-cobalt-train-mae-grad-experiments
  prognostic_vars_key: full_state_all
  boundary_vars_key: standard_forcing
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_Clim

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 16
  persistent_workers: true
  prefetch_factor: 4
  hist: 1
  concurrent_compute: true

model:
  checkpointing: "all"
  pred_residuals: false
  last_kernel_size: 3
  pad: "constant"

  # Same architecture as baseline for fair comparison
  unet:
    ch_width: [320, 440, 600]
    dilation: [1, 2, 4]
    n_layers: [1, 1, 1]

    core_block:
      block_type: "conv_next_block"
      kernel_size: 3
      activation: "capped_gelu"
      upscale_factor: 2
      norm: "batch"

    down_sampling_block: "avg_pool"
    up_sampling_block: "bilinear_upsample"

  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false
