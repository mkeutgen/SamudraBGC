# yaml-language-server: $schema=schemas/TrainConfig.json

# EXPERIMENT ONE : Using a mean absolute error loss rather than an MSE 

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 60
batch_size: 1 
learning_rate: 0.0002
scheduler: { type: cosine }
loss: gradient_mae # -> Only change compared to baseline 
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0

# Time ranges using noleap calendar (YYYY-MM-DD format)
train_time:
  start: "2016-01-01"
  end: "2023-12-31" # 8 years and a half
val_time:
  start: "2024-01-01"
  end: "2024-12-31" 
inference_times:
  - start: "2024-01-01"  # Validation period
    end: "2024-06-30"
  - start: "2025-07-01"  # True Out of Sample Extrapolation test
    end: "2025-12-31"

data_stride: [1]
steps: [4]
step_transition: []

backend: auto

experiment:
  name: mom6_cobalt_bgc_clim_mae_gradient
  rand_seed: 15
  base_output_dir: ./outputs
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: mom6-cobalt-train
  prognostic_vars_key: full_state_all  # 451 variables (50 levels × 9 vars + SSH)
  boundary_vars_key: standard_forcing
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_Clim  # UPDATE THIS PATH

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  # mkeutgen : this is optimized for the amount of my HPC config and minimize data_load_time, you might have to play with those values a bit
  num_workers: 16
  persistent_workers: true  # Only applies if num_workers > 0
  prefetch_factor: 4  # Only applies if num_workers > 0
  hist: 1
  concurrent_compute: true

model:
  pred_residuals: false
  last_kernel_size: 3
  pad: "constant" # Changed from original Samudra : "circular". For this MOM6 regional DG, coordinate is not periodic because here lon does not span -180 180

  # UNet architecture adjusted for 50 depth levels
  # Input channels: 357 (prog) + 4 (bound) = 361
  unet:
    ch_width: [320, 440, 600]  # 3 levels
    dilation: [1, 2, 4]        # Smooth progression
    n_layers: [1, 1, 1]

    core_block:
      block_type: "conv_next_block"
      kernel_size: 3
      activation: "capped_gelu"
      upscale_factor: 2
      norm: "batch"

    down_sampling_block: "avg_pool"
    up_sampling_block: "bilinear_upsample"

  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false