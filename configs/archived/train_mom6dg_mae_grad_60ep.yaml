# yaml-language-server: $schema=schemas/TrainConfig.json

# =============================================================================
# EXPERIMENT 1C: MAE + Gradient (Unweighted) with Extended Training
# =============================================================================
# Priority: HIGH - Test if training time is the issue
#
# Uses your current unweighted MAE+gradient implementation but trains for
# 60 epochs (2x baseline). Dual-objective loss functions often need significantly
# more training time to converge properly.
#
# Expected outcome: If bias decreases substantially from 30→60 epochs, this
# suggests the loss function is fine but needs more optimization time. If bias
# stays high, the loss formulation is the problem.
# =============================================================================

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 60  # 2x baseline training time
batch_size: 1 
learning_rate: 0.0002
scheduler: { type: cosine }

loss: mae_gradient  # my current unweighted implementation

finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0

train_time:
  start: "2016-01-01"
  end: "2023-12-31"
val_time:
  start: "2024-01-01"
  end: "2024-12-31" 
inference_times:
  - start: "2024-01-01"
    end: "2024-06-30"
  - start: "2025-07-01"
    end: "2025-12-31"

data_stride: [1]
steps: [4]
step_transition: []

backend: auto

experiment:
  name: mom6_cobalt_bgc_clim_mae_grad_60ep
  rand_seed: 15
  base_output_dir: ./outputs
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: mom6-cobalt-train-mae-grad-experiments
  prognostic_vars_key: full_state_all
  boundary_vars_key: standard_forcing
  data_root: /scratch/cimes/maximek/INMOS/processed_data/MOM6_CobaltDG_Clim

data:
  data_location: bgc_data.zarr
  data_means_location: bgc_means.zarr
  data_stds_location: bgc_stds.zarr
  scaling_residuals_file: null
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  hist: 1
  concurrent_compute: true

model:
  pred_residuals: false
  last_kernel_size: 3
  pad: "constant"

  unet:
    ch_width: [320, 440, 600]
    dilation: [1, 2, 4]
    n_layers: [1, 1, 1]

    core_block:
      block_type: "conv_next_block"
      kernel_size: 3
      activation: "capped_gelu"
      upscale_factor: 2
      norm: "batch"

    down_sampling_block: "avg_pool"
    up_sampling_block: "bilinear_upsample"

  corrector:
    non_negative_corrector_names: null
    ocean_heat_corrector: false
