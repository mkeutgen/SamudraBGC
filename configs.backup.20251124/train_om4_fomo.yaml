# yaml-language-server: $schema=schemas/TrainConfig.json

debug: false
disk_mode: true
pin_mem: true
save_freq: 5
epochs: 70
batch_size: 4
learning_rate: 0.0006
scheduler: { type: cosine }
loss: mse_dynamic_no_limit
finetune: false
resume_ckpt_path: null
inference_epochs: []
data_percent: 1.0
train_time:
  start: "1975-01-03"
  end: "2013-10-05"
val_time:
  start: "2013-10-05"
  end: "2014-10-05"
inference_times:
  - start: "1975-01-03"
    end: "1976-01-03" # "1985-01-03"
  - start: "1985-01-03"
    end: "1986-01-03" # "1995-01-03"
  - start: "1995-01-03"
    end: "1996-01-03" # "2005-01-03"
  - start: "2004-10-05"
    end: "2005-10-05" # "2014-10-05"
data_stride: [1]
steps: [4]
step_transition: []

backend: auto

experiment:
  name: local_om4_fomo
  rand_seed: 15
  base_output_dir: .LOCAL
  wandb:
    mode: disabled
    project: ocean-emulators
    entity: m2lines
    group: samudra-train-om4
  prognostic_vars_key: thermo_dynamic_all
  boundary_vars_key: tau_hfds_hfds_anom
data: !include data/public.yaml

model:
  pred_residuals: false
  last_kernel_size: 3
  pad: "circular"
  checkpointing: "all"
  embedding_dim: 280

  encoder:
    perceiver_depth: 3
    patch_size: [12, 20]
    perceiver_latent_dim: 64
    perceiver_num_latents: 256

  processor:
    ch_width: [380, 480, 520]
    dilation: [1, 1, 1]
    n_layers: [1, 1, 1]

    core_block:
      block_type: "conv_next_block"
      kernel_size: 3
      activation: "capped_gelu"
      upscale_factor: 2
      norm: "batch"

    down_sampling_block: "avg_pool"
    up_sampling_block: "bilinear_upsample"
